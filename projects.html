            <div class="theme-switch-wrapper">
              <label class="theme-switch" for="checkbox">
                <input id="toggle" class="toggle" type="checkbox">
                <div class="slider round"></div>
              </label>
              <script>
                const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
                let darkModeOn = false;
                
                document.addEventListener("DOMContentLoaded", () => {
                  // When the DOM is loaded, we should check the user's theme preference
                  const currentTheme = localStorage.getItem('theme');
                  if (currentTheme) { // check if theme is defined i.e. has the user set their theme preference before
                    if (currentTheme == 'dark'){
                      darkModeOn = true;
                    }
                    else {
                      darkModeOn = false;
                    }
                  }
                  else {
                    if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
                      darkModeOn = true;
                    } else { // If not set AND system doesn't have a preference, check the button since attribute is not defined yet
                      if (e.target.checked) {
                        darkModeOn = true;
                      } else {
                        darkModeOn = false;
                      }
                    }
                  }
                  // First figure out if dark mode is on or off, then we can set the lighting mode
                  // This improves the maintainability of our code since we write the lighting code here once :3
                  if (darkModeOn) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById("mainNav").classList.add('bg-dark');
                    toggleSwitch.checked = true;
                  } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    document.getElementById("mainNav").classList.add('bg-light');
                    toggleSwitch.checked = false;
                  }
                  
                })

                function toggleDarkMode(e) {
                    if (e.target.checked) {
                        document.documentElement.setAttribute('data-theme', 'light');
                        localStorage.setItem('theme', 'light');
                        document.getElementById("mainNav").classList.remove('bg-dark');
                        document.getElementById("mainNav").classList.remove('navbar-dark');
                    }
                    else {
                      document.documentElement.setAttribute('data-theme', 'dark');
                      localStorage.setItem('theme', 'dark');
                      document.getElementById("mainNav").classList.add('bg-dark');
                      document.getElementById("mainNav").classList.add('navbar-dark');
                    }    
                }
        
                toggleSwitch.addEventListener('change', toggleDarkMode, false);
              </script>
            </div>
